<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edge Case Tests</title>
    <style>
      :root {
        --bg: #f5efe9;
        --panel: #fffaf5;
        --line: rgba(38, 29, 22, 0.1);
        --text: #231811;
        --muted: #6f5d52;
        --navy: #24425d;
        --green: #1f7a53;
        --green-soft: rgba(31, 122, 83, 0.12);
        --red: #b94b47;
        --red-soft: rgba(185, 75, 71, 0.12);
        --yellow: #a56b14;
        --yellow-soft: rgba(243, 190, 98, 0.18);
        --shadow: 0 24px 60px rgba(74, 47, 29, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI Variable", "Malgun Gothic", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(243, 190, 98, 0.22), transparent 24%),
          linear-gradient(180deg, var(--bg) 0%, #fcf8f4 100%);
      }

      .page {
        max-width: 1200px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      .hero {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 22px;
      }

      .hero h1 {
        margin: 0 0 10px;
        font-size: clamp(28px, 4vw, 46px);
        line-height: 1.08;
        letter-spacing: -0.04em;
      }

      .hero p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .toolbar {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      button {
        border: 1px solid rgba(36, 66, 93, 0.12);
        border-radius: 14px;
        padding: 12px 16px;
        background: #ffffff;
        color: var(--navy);
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      .summary {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
        margin-bottom: 20px;
      }

      .summary-card {
        padding: 16px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.82);
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
      }

      .summary-card strong {
        display: block;
        font-size: 26px;
        margin-bottom: 6px;
      }

      .summary-card span {
        color: var(--muted);
        font-weight: 700;
      }

      .panel {
        padding: 20px;
        border-radius: 24px;
        background: rgba(255, 250, 245, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.7);
        box-shadow: var(--shadow);
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }

      .panel-head h2 {
        margin: 0;
      }

      .panel-head span {
        color: var(--muted);
        font-weight: 700;
      }

      .result-list {
        display: grid;
        gap: 14px;
      }

      .result-card {
        padding: 16px;
        border-radius: 20px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.8);
      }

      .result-card.pass {
        border-color: rgba(31, 122, 83, 0.22);
        background: linear-gradient(180deg, rgba(31, 122, 83, 0.08), rgba(255, 255, 255, 0.84));
      }

      .result-card.fail {
        border-color: rgba(185, 75, 71, 0.22);
        background: linear-gradient(180deg, rgba(185, 75, 71, 0.08), rgba(255, 255, 255, 0.84));
      }

      .result-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .result-top h3 {
        margin: 0;
        font-size: 18px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 72px;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 800;
      }

      .badge.pass {
        background: var(--green-soft);
        color: var(--green);
      }

      .badge.fail {
        background: var(--red-soft);
        color: var(--red);
      }

      .meta {
        margin: 0 0 12px;
        color: var(--muted);
        line-height: 1.6;
        font-weight: 600;
      }

      .check-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 8px;
      }

      .check-item {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(36, 24, 17, 0.04);
        border: 1px solid rgba(36, 24, 17, 0.05);
      }

      .check-item strong {
        display: block;
        margin-bottom: 4px;
      }

      .check-item span {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.55;
      }

      .check-status {
        font-size: 12px;
        font-weight: 800;
        white-space: nowrap;
      }

      .check-status.pass {
        color: var(--green);
      }

      .check-status.fail {
        color: var(--red);
      }

      .note {
        margin-top: 12px;
        padding: 12px 14px;
        border-radius: 16px;
        background: var(--yellow-soft);
        color: var(--yellow);
        line-height: 1.6;
        font-weight: 700;
      }

      .console {
        margin-top: 16px;
        padding: 14px 16px;
        border-radius: 18px;
        background: #1d2028;
        color: #f5f6fb;
        font-family: "Cascadia Code", Consolas, monospace;
        font-size: 12px;
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-word;
      }

      @media (max-width: 860px) {
        .hero {
          flex-direction: column;
          align-items: flex-start;
        }

        .summary {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 520px) {
        .summary {
          grid-template-columns: 1fr;
        }

        .result-top,
        .panel-head {
          flex-direction: column;
          align-items: flex-start;
        }

        .check-item {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <div>
          <h1>Edge Case Test Suite</h1>
          <p>
            중첩 구조, 공백 처리, 대량 리스트, 속성 혼합 변경 4가지를 바로 검증할 수 있는
            테스트 페이지입니다.
          </p>
        </div>

        <div class="toolbar">
          <button id="run-tests-button" type="button">테스트 다시 실행</button>
        </div>
      </header>

      <section class="summary">
        <article class="summary-card">
          <strong id="summary-total">0</strong>
          <span>전체 테스트</span>
        </article>
        <article class="summary-card">
          <strong id="summary-pass">0</strong>
          <span>통과</span>
        </article>
        <article class="summary-card">
          <strong id="summary-fail">0</strong>
          <span>실패</span>
        </article>
        <article class="summary-card">
          <strong id="summary-time">0 ms</strong>
          <span>총 실행 시간</span>
        </article>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>테스트 결과</h2>
          <span id="suite-status">준비 완료</span>
        </div>

        <div id="result-list" class="result-list"></div>
        <div id="suite-console" class="console"></div>
      </section>
    </div>

    <script defer src="./vdom.js"></script>
    <script defer src="./diff.js"></script>
    <script defer src="./history.js"></script>
    <script defer src="./edge-case-tests.js"></script>
  </body>
</html>
