<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Always-on Story Monitor</title>
    <style>
      :root {
        --bg: #08111f;
        --panel: rgba(15, 23, 42, 0.82);
        --panel-border: rgba(148, 163, 184, 0.18);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --good: #22c55e;
        --warn: #f59e0b;
        --bad: #ef4444;
        --accent: #38bdf8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family: "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(56, 189, 248, 0.18), transparent 30%),
          linear-gradient(160deg, #020617 0%, #111827 45%, #172554 100%);
      }

      .page {
        width: min(1120px, calc(100% - 32px));
        margin: 32px auto 48px;
      }

      .hero {
        display: grid;
        gap: 12px;
        margin-bottom: 22px;
      }

      .hero h1 {
        margin: 0;
        font-size: clamp(28px, 5vw, 42px);
      }

      .hero p {
        margin: 0;
        line-height: 1.6;
        color: var(--muted);
      }

      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 8px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        color: #04101c;
        background: linear-gradient(135deg, #67e8f9, #38bdf8);
      }

      button.secondary {
        color: var(--text);
        background: rgba(15, 23, 42, 0.75);
        border: 1px solid var(--panel-border);
      }

      button:disabled {
        opacity: 0.6;
        cursor: progress;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 14px;
        margin-bottom: 20px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 20px;
        padding: 18px;
        backdrop-filter: blur(18px);
        box-shadow: 0 18px 35px rgba(2, 6, 23, 0.28);
      }

      .label {
        color: var(--muted);
        font-size: 13px;
        margin-bottom: 8px;
      }

      .value {
        font-size: 24px;
        font-weight: 700;
      }

      .value.small {
        font-size: 16px;
      }

      .value.good {
        color: var(--good);
      }

      .value.warn {
        color: var(--warn);
      }

      .value.bad {
        color: var(--bad);
      }

      .section {
        display: grid;
        gap: 14px;
        grid-template-columns: 1.25fr 1fr;
      }

      .list {
        display: grid;
        gap: 10px;
      }

      .user-row,
      .event-row {
        padding: 14px;
        border-radius: 16px;
        background: rgba(15, 23, 42, 0.68);
        border: 1px solid rgba(148, 163, 184, 0.12);
      }

      .user-row strong,
      .event-row strong {
        display: block;
        margin-bottom: 6px;
      }

      .meta {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 12px;
        font-weight: 700;
        margin-bottom: 10px;
      }

      .pill.info {
        color: #bae6fd;
        background: rgba(14, 165, 233, 0.16);
      }

      .pill.warn {
        color: #fde68a;
        background: rgba(245, 158, 11, 0.15);
      }

      .pill.error {
        color: #fecaca;
        background: rgba(239, 68, 68, 0.15);
      }

      .empty {
        color: var(--muted);
      }

      @media (max-width: 820px) {
        .section {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <h1>Always-on Story Monitor</h1>
        <p>
          이 페이지는 현재 서버가 자동으로 반복 실행 중인지 보여주는 대시보드입니다.
          아래의 다음 실행 시간과 누적 실행 횟수가 계속 바뀌면 자동 모니터링이 정상 동작 중입니다.
        </p>
        <div class="actions">
          <button id="run-now">지금 한 번 실행</button>
          <button id="refresh" class="secondary">새로고침</button>
        </div>
      </section>

      <section class="grid">
        <article class="card">
          <div class="label">모니터 준비 상태</div>
          <div id="ready-value" class="value">-</div>
        </article>
        <article class="card">
          <div class="label">현재 실행 상태</div>
          <div id="running-value" class="value">-</div>
        </article>
        <article class="card">
          <div class="label">다음 자동 실행</div>
          <div id="next-value" class="value small">-</div>
        </article>
        <article class="card">
          <div class="label">누적 실행 횟수</div>
          <div id="cycle-count-value" class="value">-</div>
        </article>
        <article class="card">
          <div class="label">현재 접속 주소</div>
          <div id="port-value" class="value small">-</div>
        </article>
        <article class="card">
          <div class="label">마지막 실행 완료</div>
          <div id="finished-value" class="value small">-</div>
        </article>
      </section>

      <section class="section">
        <article class="card">
          <div class="label">계정 상태</div>
          <div id="users" class="list"></div>
        </article>
        <article class="card">
          <div class="label">최근 이벤트</div>
          <div id="events" class="list"></div>
        </article>
      </section>
    </main>

    <script>
      const readyValue = document.querySelector("#ready-value");
      const runningValue = document.querySelector("#running-value");
      const nextValue = document.querySelector("#next-value");
      const cycleCountValue = document.querySelector("#cycle-count-value");
      const portValue = document.querySelector("#port-value");
      const finishedValue = document.querySelector("#finished-value");
      const usersRoot = document.querySelector("#users");
      const eventsRoot = document.querySelector("#events");
      const runNowButton = document.querySelector("#run-now");
      const refreshButton = document.querySelector("#refresh");

      function formatDate(value) {
        if (!value) return "-";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        return new Intl.DateTimeFormat("ko-KR", {
          dateStyle: "medium",
          timeStyle: "medium",
        }).format(date);
      }

      function renderUsers(users) {
        const entries = Object.entries(users || {});

        if (!entries.length) {
          usersRoot.innerHTML =
            '<div class="empty">아직 저장된 계정 상태가 없습니다.</div>';
          return;
        }

        usersRoot.innerHTML = entries
          .map(
            ([key, user]) => `
              <div class="user-row">
                <strong>${user.detectedUsername || key}</strong>
                <div class="meta">ID: ${key}</div>
                <div class="meta">현재 스토리 수: ${user.count ?? 0}</div>
                <div class="meta">마지막 확인: ${formatDate(user.lastCheckedAt)}</div>
              </div>
            `
          )
          .join("");
      }

      function renderEvents(events) {
        if (!Array.isArray(events) || !events.length) {
          eventsRoot.innerHTML =
            '<div class="empty">아직 이벤트가 없습니다.</div>';
          return;
        }

        eventsRoot.innerHTML = events
          .slice(0, 12)
          .map((event) => {
            const type =
              event.level === "error"
                ? "error"
                : event.level === "warn"
                  ? "warn"
                  : "info";

            return `
              <div class="event-row">
                <span class="pill ${type}">${event.level}</span>
                <strong>${event.message}</strong>
                <div class="meta">${formatDate(event.at)}</div>
                ${event.trigger ? `<div class="meta">트리거: ${event.trigger}</div>` : ""}
                ${event.username ? `<div class="meta">계정: ${event.username}</div>` : ""}
                ${event.error ? `<div class="meta">${event.error}</div>` : ""}
              </div>
            `;
          })
          .join("");
      }

      async function loadStatus() {
        const response = await fetch("/api/status");
        const status = await response.json();

        readyValue.textContent = status.monitorReady ? "READY" : "CONFIG NEEDED";
        readyValue.className = `value ${status.monitorReady ? "good" : "warn"}`;

        runningValue.textContent = status.running ? "RUNNING" : "WAITING";
        runningValue.className = `value ${status.running ? "good" : "warn"}`;

        nextValue.textContent = formatDate(status.nextCycleAt);
        cycleCountValue.textContent = String(status.cycleCount ?? 0);
        finishedValue.textContent = formatDate(status.lastCycleFinishedAt);
        portValue.textContent = `${location.origin} (앱 포트 ${status.config?.port ?? "-"})`;

        renderUsers(status.users);
        renderEvents(status.events);
      }

      async function runNow() {
        runNowButton.disabled = true;
        runNowButton.textContent = "실행 중...";

        try {
          const response = await fetch("/api/run-now", { method: "POST" });
          const payload = await response.json();

          if (!response.ok || !payload.ok) {
            throw new Error(payload.error || "실행 요청에 실패했습니다.");
          }

          await loadStatus();
        } catch (error) {
          alert(String(error));
        } finally {
          runNowButton.disabled = false;
          runNowButton.textContent = "지금 한 번 실행";
        }
      }

      runNowButton.addEventListener("click", runNow);
      refreshButton.addEventListener("click", loadStatus);

      loadStatus();
      setInterval(loadStatus, 5000);
    </script>
  </body>
</html>
